kind = "web"
previewPath = "/"
title = "Research & Biostatistics Learning Hub"
version = "1.0.0"
id = "artifacts/dental-research-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19995
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dental-research-hub run dev"

[services.env]
PORT = "19995"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dental-research-hub", "run", "build"]
publicDir = "artifacts/dental-research-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
